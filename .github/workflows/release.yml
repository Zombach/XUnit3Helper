# 1.2. Создание пайплайна с триггером запуска
# Имя пайплайна
name: Create release and publish NuGet

# Условия при котором пайплайн будет запускаться. В данном случае это комит в удаленную ветку master
on:
  push:
    branches:
      - "master"

concurrency:
  group: release-master
  cancel-in-progress: false

# permissions:
#   contents: write

jobs:
  # 2. Добавление проверки прохождения тестов
  run_test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.x'

      - name: Run Tests
        shell: pwsh
        run: dotnet test ./tests/XUnit3Helper.Tests/XUnit3Helper.Tests.csproj --configuration Release

      - name: Run IntegrationTests
        shell: pwsh
        run: dotnet test ./tests/XUnit3Helper.Integration.Tests/XUnit3Helper.Integration.Tests.csproj --configuration Release
  
  # 3. Добавление проверки текущей версии проекта
  check_version:
    name: Check project version
    runs-on: ubuntu-latest
    outputs:
      # Возвращает результат проверки в переменной is_valid
      # Из других джоб на результат можно получить используя выражение needs.check_version.outputs.is_valid
      is_valid: ${{ steps.compare_versions.outputs.is_valid }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read project versions
        id: get_version
        shell: bash
        run: |
          VERSION_MAIN=$(grep -oPm1 "(?<=<Version>)[^<]+" ./src/XUnit3Helper/XUnit3Helper.csproj)
          VERSION_INTEGRATION=$(grep -oPm1 "(?<=<Version>)[^<]+" ./src/XUnit3Helper.Integration/XUnit3Helper.Integration.csproj)
          VERSION_STARTUP=$(grep -oPm1 "(?<=<Version>)[^<]+" ./src/XUnit3Helper.StartupModule/XUnit3Helper.StartupModule.csproj)

          echo "XUnit3Helper: $VERSION_MAIN"
          echo "XUnit3Helper.Integration: $VERSION_INTEGRATION"
          echo "XUnit3Helper.StartupModule: $VERSION_STARTUP"

          if [[ "$VERSION_MAIN" != "$VERSION_INTEGRATION" ]]; then
            echo "::error::Package versions mismatch"
            exit 1
          fi

          if [[ "$VERSION_MAIN" != "$VERSION_STARTUP" ]]; then
            echo "::error::Package versions mismatch"
            exit 1
          fi

          echo "version=$VERSION_MAIN" >> $GITHUB_OUTPUT

      - name: Get latest tag
        id: compare_versions
        shell: bash
        run: |
          git fetch --tags

          VERSION="${{ steps.get_version.outputs.version }}"
          LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1)

          echo "Project version: $VERSION"
          echo "Latest tag: $LATEST_TAG"

          GREATER_VERSION=$(printf "%s\n%s" "$VERSION" "${LATEST_TAG#v}" | sort -V | tail -n 1)

          if [[ "$VERSION" == "$GREATER_VERSION" && "$VERSION" != "${LATEST_TAG#v}" ]]; then
            echo "is_valid=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Project version must be greater than latest tag"
            echo "is_valid=false" >> $GITHUB_OUTPUT
          fi

  # 4. Добавление тега с версией на текущий релизный комит
  tag_and_push:
    name: Create and push release tag
    runs-on: ubuntu-latest
    # Джоба ожидает выполнения указанных в условии других джоб
    needs: [run_test, check_version]
    # Создаем  тег после того, как убедились, что юнит тесты пройдены и проверка версии завершена успешно
    if: ${{ success() && needs.check_version.outputs.is_valid == 'true' }}

    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Изменим в конфигурации Git текущей джобы имя и адрес почты автора для тега
      - name: Set up Git
        run: |
          git config --global user.name "${{ secrets.GIT_USER_NAME }}"
          git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Fetch the latest changes from the remote repository
        run: git fetch --tags

      - name: Create and push tag
        id: create_tag
        shell: bash
        run: |
          VERSION="${{ needs.check_version.outputs.version }}"
          NEW_TAG="v$VERSION"

          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "::error::Tag already exists: $NEW_TAG"
            exit 1
          fi

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

  # 5. Создание релиза в репозитории GitHub
  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: tag_and_push
    if: success()
    env:
      # Временный токен для аутентфиикации воркфлоу для создания релиза
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create GitHub release
        run: |
          gh release create "${{ needs.tag_and_push.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "${{ needs.tag_and_push.outputs.tag }}" \
            --generate-notes \
            --verify-tag \
            --latest

  # 1.3. Добавления джобы сборки пакета
  # Уникальный индентификатор джобы, который может использоваться при необходимости как ссылка
  create_nuget:
    # Юзер френдли имя джобы, которое будет отображаться на UI
    name: Create NuGet
    # Среда исполения. Каждая джоба выполняется изолировано в своем окружении
    runs-on: ubuntu-latest
    # Save path to the NuGet directory in the environment variable
    needs: tag_and_push
    if: success()
    env:
      NuGetDirectory: ${{ github.workspace }}/nuget
    # Перечень последовательно запускаемых команд
    steps:
      # Чекаут на комит ветки для доступа к исходному коду
      - name: Checkout repository
        uses: actions/checkout@v6

      # Установка SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.x'

      # Сборка и упаковка пакета
      - name: Pack XUnit3Helper
        shell: pwsh
        run: dotnet pack ./src/XUnit3Helper/XUnit3Helper.csproj --configuration Release --output ${{ env.NuGetDirectory }}

        # Сборка и упаковка пакета
      - name: Pack XUnit3Helper.Integration
        shell: pwsh
        run: dotnet pack ./src/XUnit3Helper.Integration/XUnit3Helper.Integration.csproj --configuration Release --output ${{ env.NuGetDirectory }}

        # Сборка и упаковка пакета
      - name: Pack XUnit3Helper.StartupModule
        shell: pwsh
        run: dotnet pack ./src/XUnit3Helper.StartupModule/XUnit3Helper.StartupModule.csproj --configuration Release --output ${{ env.NuGetDirectory }}
        
      # Загрузка артефакта в хранилище для доступа к нему из других джоб
      - uses: actions/upload-artifact@v7
        with:
          name: nuget
          if-no-files-found: error
          retention-days: 7
          path: ${{ env.NuGetDirectory }}/*.nupkg

  # 1.4. Добавления джобы публикации пакета
  deploy:
    name: Deploy NuGet
    runs-on: ubuntu-latest
    # Перед публикацией необходим готовый артефакт.
    # Поэтому эта джоба ждет завершения выполнения джобы create_nuget
    needs: create_nuget
    # Выполнить, если успешно завершилось выполнение create_nuget
    if: success()
    # Save path to the NuGet directory in the environment variable
    env:
      NuGetDirectory: ${{ github.workspace }}/nuget
    steps:
      # Загружаем содержимое хранилища
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: nuget
          path: ${{ env.NuGetDirectory }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '11.x'

      # С помощью dotnet утилиты nuget публикуе пакет
      - name: Publish NuGet package
        shell: pwsh
        run: |
          foreach($file in (Get-ChildItem "${{ env.NuGetDirectory }}" -Recurse -Include *.nupkg)) {
              dotnet nuget push $file `
                --api-key "${{ secrets.NUGET_API_KEY }}" `
                --source https://api.nuget.org/v3/index.json `
                --skip-duplicate
          }
